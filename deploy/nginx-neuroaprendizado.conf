# NeuroForge — Multi-domain Nginx Configuration
# All domains point to the same Node.js app on port 3000
# After editing, run: sudo nginx -t && sudo systemctl reload nginx

# Redirect www to non-www for all domains
server {
    listen 80;
    listen 443 ssl;
    server_name www.neuroforgeapp.com.br www.neuroforge.cloud;

    # Certbot will insert SSL certs here automatically
    # ssl_certificate /etc/letsencrypt/live/...
    # ssl_certificate_key /etc/letsencrypt/live/...

    return 301 https://$host$request_uri;
}

# Main server block — accepts ALL domains
server {
    listen 80;
    server_name
        neuroforgeapp.com.br
        neuroforge.cloud
        neuroaprendizado.unipar.jacksonuti.cloud;

    # Redirect HTTP to HTTPS (Certbot will handle this after SSL setup)
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server block — the actual app
server {
    listen 443 ssl;
    server_name
        neuroforgeapp.com.br
        neuroforge.cloud
        neuroaprendizado.unipar.jacksonuti.cloud;

    # Certbot will auto-populate these lines:
    # ssl_certificate /etc/letsencrypt/live/neuroforgeapp.com.br/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/neuroforgeapp.com.br/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy to Node.js app
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Static assets caching (CSS, JS, images)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
