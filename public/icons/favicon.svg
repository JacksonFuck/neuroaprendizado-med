<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#e040fb"/>
    </linearGradient>
    <linearGradient id="synapseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e040fb;stop-opacity:0.6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0a0b18" stroke="url(#synapseGrad)" stroke-width="4"/>

  <!-- Brain outline — stylized hemispheres -->
  <g filter="url(#glow)" transform="translate(256,240)">
    <!-- Left hemisphere -->
    <path d="M-8,-100 C-70,-100 -120,-65 -120,-10 C-120,20 -105,48 -80,65 C-65,75 -50,95 -45,110 C-40,120 -20,125 -8,120"
          fill="none" stroke="url(#brainGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Right hemisphere -->
    <path d="M8,-100 C70,-100 120,-65 120,-10 C120,20 105,48 80,65 C65,75 50,95 45,110 C40,120 20,125 8,120"
          fill="none" stroke="url(#brainGrad)" stroke-width="6" stroke-linecap="round"/>

    <!-- Brain folds left -->
    <path d="M-90,-50 C-60,-55 -35,-20 -10,-25" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-100,-5 C-70,5 -40,-15 -10,0" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-95,35 C-65,25 -35,50 -15,40" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Brain folds right -->
    <path d="M90,-50 C60,-55 35,-20 10,-25" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M100,-5 C70,5 40,-15 10,0" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M95,35 C65,25 35,50 15,40" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Central synapse spark -->
    <circle cx="0" cy="-10" r="8" fill="#00f0ff" opacity="0.9">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="r" values="6;10;6" dur="2s" repeatCount="indefinite"/>
    </circle>

    <!-- Synapse connections radiating -->
    <line x1="0" y1="-10" x2="-40" y2="-60" stroke="#00f0ff" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="-10" x2="40" y2="-60" stroke="#e040fb" stroke-width="2" opacity="0.4"/>
    <line x1="0" y1="-10" x2="-50" y2="30" stroke="#00f0ff" stroke-width="2" opacity="0.3"/>
    <line x1="0" y1="-10" x2="50" y2="30" stroke="#e040fb" stroke-width="2" opacity="0.3"/>

    <!-- Small synapse nodes -->
    <circle cx="-40" cy="-60" r="4" fill="#00f0ff" opacity="0.6"/>
    <circle cx="40" cy="-60" r="4" fill="#e040fb" opacity="0.6"/>
    <circle cx="-50" cy="30" r="3" fill="#00f0ff" opacity="0.4"/>
    <circle cx="50" cy="30" r="3" fill="#e040fb" opacity="0.4"/>
  </g>

  <!-- Bottom text: NF -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="48" fill="url(#brainGrad)" letter-spacing="8">NF</text>
</svg>
