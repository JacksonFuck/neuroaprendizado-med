<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="100%" style="stop-color:#e040fb"/>
    </linearGradient>
    <linearGradient id="synapseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#e040fb;stop-opacity:0.7"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f0ff"/>
      <stop offset="50%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e040fb"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="boltGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle with brighter border -->
  <circle cx="256" cy="256" r="240" fill="#0a0b18" stroke="url(#synapseGrad)" stroke-width="5"/>

  <!-- Outer glow ring -->
  <circle cx="256" cy="256" r="236" fill="none" stroke="url(#synapseGrad)" stroke-width="2" opacity="0.3">
    <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Brain outline — stylized hemispheres -->
  <g filter="url(#glow)" transform="translate(256,235)">
    <!-- Left hemisphere -->
    <path d="M-8,-100 C-70,-100 -120,-65 -120,-10 C-120,20 -105,48 -80,65 C-65,75 -50,95 -45,110 C-40,120 -20,125 -8,120"
          fill="none" stroke="url(#brainGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- Right hemisphere -->
    <path d="M8,-100 C70,-100 120,-65 120,-10 C120,20 105,48 80,65 C65,75 50,95 45,110 C40,120 20,125 8,120"
          fill="none" stroke="url(#brainGrad)" stroke-width="6" stroke-linecap="round"/>

    <!-- Brain folds left -->
    <path d="M-90,-50 C-60,-55 -35,-20 -10,-25" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-100,-5 C-70,5 -40,-15 -10,0" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M-95,35 C-65,25 -35,50 -15,40" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Brain folds right -->
    <path d="M90,-50 C60,-55 35,-20 10,-25" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M100,-5 C70,5 40,-15 10,0" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>
    <path d="M95,35 C65,25 35,50 15,40" fill="none" stroke="url(#brainGrad)" stroke-width="3.5" stroke-linecap="round" opacity="0.7"/>

    <!-- Central synapse spark — brighter -->
    <circle cx="0" cy="-10" r="10" fill="#00f0ff" opacity="0.95">
      <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r" values="7;12;7" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <!-- Inner white core -->
    <circle cx="0" cy="-10" r="4" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <!-- LIGHTNING BOLTS — animated -->
    <!-- Bolt 1: top-left -->
    <g filter="url(#boltGlow)">
      <path d="M-25,-55 L-18,-40 L-28,-38 L-15,-20" fill="none" stroke="url(#boltGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="0s"/>
      </path>
    </g>
    <!-- Bolt 2: top-right -->
    <g filter="url(#boltGlow)">
      <path d="M25,-55 L18,-40 L28,-38 L15,-20" fill="none" stroke="url(#boltGrad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="opacity" values="0;1;1;0" dur="2.5s" repeatCount="indefinite" begin="0.8s"/>
      </path>
    </g>
    <!-- Bolt 3: left -->
    <g filter="url(#boltGlow)">
      <path d="M-60,-10 L-45,-5 L-52,5 L-35,15" fill="none" stroke="#00f0ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
      </path>
    </g>
    <!-- Bolt 4: right -->
    <g filter="url(#boltGlow)">
      <path d="M60,-10 L45,-5 L52,5 L35,15" fill="none" stroke="#e040fb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <animate attributeName="opacity" values="0;0.8;0.8;0" dur="3s" repeatCount="indefinite" begin="2s"/>
      </path>
    </g>

    <!-- Synapse connections radiating -->
    <line x1="0" y1="-10" x2="-40" y2="-60" stroke="#00f0ff" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-10" x2="40" y2="-60" stroke="#e040fb" stroke-width="2" opacity="0.5"/>
    <line x1="0" y1="-10" x2="-50" y2="30" stroke="#00f0ff" stroke-width="2" opacity="0.35"/>
    <line x1="0" y1="-10" x2="50" y2="30" stroke="#e040fb" stroke-width="2" opacity="0.35"/>

    <!-- Small synapse nodes — brighter -->
    <circle cx="-40" cy="-60" r="5" fill="#00f0ff" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite" begin="0.3s"/>
    </circle>
    <circle cx="40" cy="-60" r="5" fill="#e040fb" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite" begin="1s"/>
    </circle>
    <circle cx="-50" cy="30" r="4" fill="#00f0ff" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
    <circle cx="50" cy="30" r="4" fill="#e040fb" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2.5s" repeatCount="indefinite" begin="1.5s"/>
    </circle>
  </g>

  <!-- Bottom text: NF -->
  <text x="256" y="435" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="800" font-size="48" fill="url(#brainGrad)" letter-spacing="8">NF</text>
</svg>
