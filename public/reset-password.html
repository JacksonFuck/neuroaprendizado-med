<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha — Neuroaprendizado Med</title>
    <link rel="manifest" href="/manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: #050510;
            color: #b0bcd8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 420px;
            max-width: 92vw;
            background: rgba(10, 11, 26, 0.92);
            border: 1px solid rgba(0, 240, 255, 0.14);
            border-radius: 20px;
            padding: 44px 36px 36px;
            backdrop-filter: blur(24px);
            text-align: center;
            box-shadow: 0 0 60px rgba(0, 240, 255, 0.06), inset 0 1px 0 rgba(0, 240, 255, 0.1);
        }

        .logo {
            font-size: 2rem;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 1.4rem;
            color: #e0f7ff;
            margin-bottom: 8px;
        }

        p {
            font-size: 0.85rem;
            color: #6c7a9c;
            margin-bottom: 24px;
        }

        .form-group {
            text-align: left;
            margin-bottom: 16px;
        }

        label {
            font-size: 0.8rem;
            color: #7a8cb0;
            display: block;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(0, 240, 255, 0.12);
            border-radius: 10px;
            padding: 12px 14px;
            color: #e0f7ff;
            font-size: 0.95rem;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: rgba(0, 240, 255, 0.4);
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #00f0ff, #9b59f5);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 8px;
            transition: opacity 0.2s, transform 0.1s;
        }

        .btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .msg {
            margin-top: 16px;
            padding: 12px;
            border-radius: 10px;
            font-size: 0.875rem;
            display: none;
        }

        .msg.error {
            background: rgba(239, 68, 68, 0.12);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #f87171;
        }

        .msg.success {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #4ade80;
        }

        a {
            color: #00f0ff;
            text-decoration: none;
            font-size: 0.85rem;
        }

        .back {
            margin-top: 20px;
            display: block;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="logo">🧠</div>
        <h1>Redefinir Senha</h1>
        <p>Digite sua nova senha para continuar.</p>

        <div id="formArea">
            <div class="form-group">
                <label for="password">Nova Senha</label>
                <input type="password" id="password" placeholder="Mínimo 6 caracteres" />
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar Nova Senha</label>
                <input type="password" id="confirmPassword" placeholder="Repita a nova senha" />
            </div>
            <button class="btn" id="resetBtn" onclick="resetPassword()">Redefinir Senha</button>
        </div>

        <div id="msg" class="msg"></div>
        <a href="/login.html" class="back">← Voltar para o login</a>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.getElementById('formArea').style.display = 'none';
            showMsg('error', 'Link inválido. Solicite um novo link de redefinição.');
        }

        async function resetPassword() {
            const password = document.getElementById('password').value;
            const confirm = document.getElementById('confirmPassword').value;

            if (!password || password.length < 6) return showMsg('error', 'A senha deve ter no mínimo 6 caracteres.');
            if (password !== confirm) return showMsg('error', 'As senhas não coincidem.');

            const btn = document.getElementById('resetBtn');
            btn.disabled = true;
            btn.textContent = 'Redefinindo...';

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, password })
                });
                const data = await res.json();

                if (data.success) {
                    document.getElementById('formArea').style.display = 'none';
                    showMsg('success', data.message + ' Redirecionando para login...');
                    setTimeout(() => window.location.href = '/login.html', 2500);
                } else {
                    showMsg('error', data.error || 'Erro ao redefinir senha.');
                    btn.disabled = false;
                    btn.textContent = 'Redefinir Senha';
                }
            } catch {
                showMsg('error', 'Erro de conexão. Tente novamente.');
                btn.disabled = false;
                btn.textContent = 'Redefinir Senha';
            }
        }

        function showMsg(type, text) {
            const el = document.getElementById('msg');
            el.className = `msg ${type}`;
            el.textContent = text;
            el.style.display = 'block';
        }
    </script>
</body>

</html>
